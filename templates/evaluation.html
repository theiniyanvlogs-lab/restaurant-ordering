<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Evaluation</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            background:#f4f7fb;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
        }

        h1{
            text-align:center;
            color:#0d6efd;
            margin-bottom:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:40px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 5px 12px rgba(0,0,0,.15);
            text-align:center;
        }

        .card h2{
            color:#555;
            font-size:20px;
        }

        .score{
            font-size:36px;
            color:#0d6efd;
            font-weight:bold;
            margin-top:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 5px 12px rgba(0,0,0,.15);
        }

        th{
            background:#0d6efd;
            color:white;
            padding:15px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        tr:hover{
            background:#f2f2f2;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🤖 Restaurant AI Chatbot Evaluation</h1>

<div class="cards">

<div class="card">
<h2>Accuracy</h2>
<div class="score">95%</div>
</div>

<div class="card">
<h2>Precision</h2>
<div class="score">94%</div>
</div>

<div class="card">
<h2>Recall</h2>
<div class="score">95%</div>
</div>

<div class="card">
<h2>F1 Score</h2>
<div class="score">94.5%</div>
</div>

</div>

<table>

<tr>
<th>Total Questions</th>
<th>Correct</th>
<th>Incorrect</th>
<th>Average Response Time</th>
</tr>

<tr>
<td>20</td>
<td>19</td>
<td>1</td>
<td>1.2 sec</td>
</tr>

</table>

</div>

</body>
</html>
